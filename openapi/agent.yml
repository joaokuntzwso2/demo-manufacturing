openapi: 3.0.3
info:
  title: OEMOperationsVisibilityAgentAPI
  description: >
    OEM Operations Visibility Agent endpoint for discrete manufacturing,
    used as a Custom AI Provider in WSO2 API Manager.

    This API exposes a single chat endpoint that answers operational questions
    about orders (ERP+MES context) and machine/plant health (telemetry summary),
    and returns LLM usage metadata for analytics.
  version: 1.0.0

servers:
  - url: 'http://localhost:8293'
    description: Replace with the actual base URL of the OEM Agent service

security:
  - {}

paths:
  /v1/chat:
    post:
      summary: Chat with OEM Operations Visibility Agent
      description: >
        Receives a user message and a sticky sessionId, invokes the OEM agent
        (with MI/APIM-backed tools) and returns the final answer in PT-BR,
        together with LLM usage metadata.
      operationId: oemChat
      requestBody:
        description: |
          Payload de requisição para o OEM Agent.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRequest'
            example:
              sessionId: sess-oem-1
              message: >-
                Pode me dar o contexto da ordem ORD-100045 e se existe algum
                gargalo por máquina em estado CRITICAL na planta SP1?
      responses:
        '200':
          description: Successful response from OEM Agent
          headers:
            X-Correlation-Id:
              description: Correlation ID for end-to-end traceability.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              example:
                sessionId: sess-oem-1
                agentName: OEMOperationsVisibilityAgent
                promptVersion: oem-visibility-v1.0.0
                message: >-
                  Resumo: A ordem ORD-100045 está em execução e a planta SP1 tem
                  1 máquina em CRITICAL que pode virar gargalo. Recomendo priorizar
                  inspeção na M-100 antes de aumentar carga na linha.
                llm:
                  responseModel: gpt-4o
                  promptTokenCount: 42
                  completionTokenCount: 128
                  totalTokenCount: 170
        '400':
          description: Invalid request
          headers:
            X-Correlation-Id:
              description: Correlation ID for end-to-end traceability.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          description: Internal error during agent execution
          headers:
            X-Correlation-Id:
              description: Correlation ID for end-to-end traceability.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

      # Explicitly no security at operation level
      security:
        - {}

      x-auth-type: None
      x-throttling-tier: Unlimited

components:
  schemas:
    AgentRequest:
      type: object
      required:
        - sessionId
        - message
      properties:
        sessionId:
          type: string
          description: Sticky session identifier for LLM memory.
        message:
          type: string
          description: User's question (the agent answers in PT-BR).

    LlmUsage:
      type: object
      required:
        - responseModel
        - promptTokenCount
        - completionTokenCount
        - totalTokenCount
      properties:
        responseModel:
          type: string
          example: gpt-4o
        promptTokenCount:
          type: integer
          format: int32
          example: 42
        completionTokenCount:
          type: integer
          format: int32
          example: 128
        totalTokenCount:
          type: integer
          format: int32
          example: 170
        remainingTokenCount:
          type: integer
          format: int32
          nullable: true
          example: 980000
      description: >
        LLM usage metadata for analytics. Values are estimated by the backend service.

    AgentResponse:
      type: object
      required:
        - sessionId
        - agentName
        - promptVersion
        - message
      properties:
        sessionId:
          type: string
        agentName:
          type: string
          example: OEMOperationsVisibilityAgent
        promptVersion:
          type: string
          example: oem-visibility-v1.0.0
        message:
          type: string
        llm:
          $ref: '#/components/schemas/LlmUsage'

    # IMPORTANT FIX:
    # Replace boolean additionalProperties:true (if ever added later) with Schema objects ({}).
    # Here we make it explicitly safe for APIM API Product generation by setting {}.
    ErrorBody:
      type: object
      required:
        - message
      additionalProperties: {}
      properties:
        message:
          type: string
        details:
          type: string
          nullable: true

x-wso2-api-key-header: ApiKey
x-wso2-auth-header: Authorization

x-wso2-cors:
  corsConfigurationEnabled: false
  accessControlAllowOrigins:
    - '*'
  accessControlAllowCredentials: false
  accessControlAllowHeaders:
    - authorization
    - Access-Control-Allow-Origin
    - Content-Type
    - SOAPAction
    - apikey
    - Internal-Key
  accessControlAllowMethods:
    - GET
    - PUT
    - POST
    - DELETE
    - PATCH
    - OPTIONS

x-wso2-production-endpoints:
  urls:
    - 'http://localhost:8293'
  type: http

x-wso2-basePath: /oem-operations-visibility/1.0.0

x-wso2-transports:
  - http
  - https

x-wso2-application-security:
  security-types: []
  optional: true

x-wso2-response-cache:
  enabled: false
  cacheTimeoutInSeconds: 300
