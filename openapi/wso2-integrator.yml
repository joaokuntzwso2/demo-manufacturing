openapi: 3.0.3
info:
  title: Integrator - Facade APIs
  description: |
    OpenAPI spec inferred from the provided WSO2 Synapse API XMLs:
    - MachineHealthService (context: /internal/machine-health)
    - OrderCompositeAPI (context: /internal/orders)
  version: 1.0.0
servers:
  - url: /
    description: Relative base (set to your gateway host)
security:
  - default: []
tags:
  - name: MachineHealthService
    description: Machine telemetry ingestion and reporting
  - name: OrderCompositeAPI
    description: Composite order fetch (ERP + MES)
paths:
  /internal/machine-health/telemetry:
    post:
      tags:
        - MachineHealthService
      summary: HTTP telemetry ingestion
      description: >
        Accepts telemetry payload, normalizes it internally, forwards to
        telemetry-store, and returns an acknowledgement response.
      operationId: ingestTelemetry
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryIngestRequest'
            examples:
              sample:
                value:
                  machine: M-1001
                  plant: PLANT-01
                  ts: '2025-12-19T13:45:10Z'
                  temperature: 72.5
                  vibration: 0.013
        required: true
      responses:
        '202':
          description: Telemetry accepted (acknowledgement)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryAck'
              examples:
                accepted:
                  value:
                    status: accepted
                    message: Telemetry received
        '400':
          description: Invalid request (schema/validation issues)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - default: []
      x-auth-type: Application & Application User
      x-throttling-tier: Unlimited
      x-wso2-application-security:
        security-types:
          - oauth2
        optional: false
  /internal/machine-health/telemetry/last-readings:
    get:
      tags:
        - MachineHealthService
      summary: Latest readings per machine
      description: |
        Returns latest telemetry readings per machine.
        (WSO2 routes to backend path http://telemetry-store:9100/last-readings)
      operationId: getLastReadings
      responses:
        '200':
          description: Last readings per machine
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LastReadingsResponse'
              examples:
                sample:
                  value:
                    readings:
                      - machineId: M-1001
                        plantId: PLANT-01
                        timestamp: '2025-12-19T13:45:10Z'
                        temp: 72.5
                        vibration: 0.013
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - default: []
      x-auth-type: Application & Application User
      x-throttling-tier: Unlimited
      x-wso2-application-security:
        security-types:
          - oauth2
        optional: false
  /internal/machine-health/summary:
    get:
      tags:
        - MachineHealthService
      summary: Plant-level health summary
      description: |
        Returns a plant-level summary from telemetry-store.
      operationId: getPlantSummary
      responses:
        '200':
          description: Plant health summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlantSummaryResponse'
              examples:
                sample:
                  value:
                    plantId: PLANT-01
                    window:
                      from: '2025-12-19T00:00:00Z'
                      to: '2025-12-19T23:59:59Z'
                    machines:
                      total: 42
                      healthy: 39
                      warning: 2
                      critical: 1
                    metrics:
                      avgTemp: 68.2
                      avgVibration: 0.009
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - default: []
      x-auth-type: Application & Application User
      x-throttling-tier: Unlimited
      x-wso2-application-security:
        security-types:
          - oauth2
        optional: false
  '/internal/orders/orders/{id}':
    get:
      tags:
        - OrderCompositeAPI
      summary: Composite order payload (ERP + MES)
      description: >
        Fetches an order from ERP and MES backends and returns a composite JSON
        payload: { orderId, erpRaw, mesRaw } where erpRaw and mesRaw are the raw
        backend JSON bodies.
      operationId: getCompositeOrder
      parameters:
        - name: id
          in: path
          description: Order identifier
          required: true
          style: simple
          explode: false
          schema:
            type: string
      responses:
        '200':
          description: Composite order response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompositeOrderResponse'
              examples:
                sample:
                  value:
                    orderId: ORD-12345
                    erpRaw:
                      orderNumber: ORD-12345
                      status: RELEASED
                      customer: ACME
                    mesRaw:
                      orderNumber: ORD-12345
                      line: L-2
                      progressPct: 55
        '404':
          description: Order not found (from one or both backends)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - default: []
      x-auth-type: Application & Application User
      x-throttling-tier: Unlimited
      x-wso2-application-security:
        security-types:
          - oauth2
        optional: false
components:
  schemas:
    TelemetryIngestRequest:
      required:
        - machine
        - plant
        - temperature
        - ts
        - vibration
      type: object
      properties:
        machine:
          type: string
          description: Machine identifier
          example: M-1001
        plant:
          type: string
          description: Plant identifier
          example: PLANT-01
        ts:
          type: string
          description: Timestamp of the reading (as sent by client)
          example: '2025-12-19T13:45:10Z'
        temperature:
          type: number
          description: Temperature reading
          format: double
          example: 72.5
        vibration:
          type: number
          description: Vibration reading
          format: double
          example: 0.013
      additionalProperties: false
    TelemetryCanonical:
      required:
        - machineId
        - plantId
        - temp
        - timestamp
        - vibration
      type: object
      properties:
        machineId:
          type: string
        plantId:
          type: string
        timestamp:
          type: string
        temp:
          type: number
          format: double
        vibration:
          type: number
          format: double
      additionalProperties: false
      description: Canonical telemetry model after WSO2 normalization (internal).
    TelemetryAck:
      required:
        - message
        - status
      type: object
      properties:
        status:
          type: string
          example: accepted
        message:
          type: string
          example: Telemetry received
      additionalProperties: false
    LastReading:
      allOf:
        - $ref: '#/components/schemas/TelemetryCanonical'
    LastReadingsResponse:
      type: object
      properties:
        readings:
          type: array
          items:
            $ref: '#/components/schemas/LastReading'
      additionalProperties: {}
      description: Response is backend-defined; represented here as a list wrapper.
    PlantSummaryResponse:
      type: object
      properties:
        plantId:
          type: string
        window:
          type: object
          properties:
            from:
              type: string
            to:
              type: string
          additionalProperties: {}
        machines:
          type: object
          properties:
            total:
              type: integer
            healthy:
              type: integer
            warning:
              type: integer
            critical:
              type: integer
          additionalProperties: {}
        metrics:
          type: object
          additionalProperties: {}
      additionalProperties: {}
      description: Backend-defined summary payload; schema is modeled generically.
    CompositeOrderResponse:
      required:
        - erpRaw
        - mesRaw
        - orderId
      type: object
      properties:
        orderId:
          type: string
          description: Order identifier from path variable
        erpRaw:
          type: object
          additionalProperties: {}
          description: Raw ERP backend JSON payload (unmodeled)
        mesRaw:
          type: object
          additionalProperties: {}
          description: Raw MES backend JSON payload (unmodeled)
      additionalProperties: false
    Error:
      type: object
      properties:
        code:
          type: string
          example: ERROR
        message:
          type: string
          example: An error occurred
        details:
          type: object
          additionalProperties: {}
      additionalProperties: {}
  securitySchemes:
    default:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: 'https://test.com'
          scopes: {}
x-wso2-api-key-header: ApiKey
x-wso2-auth-header: Authorization
x-wso2-cors:
  corsConfigurationEnabled: false
  accessControlAllowOrigins:
    - '*'
  accessControlAllowCredentials: false
  accessControlAllowHeaders:
    - authorization
    - Access-Control-Allow-Origin
    - Content-Type
    - SOAPAction
    - apikey
    - Internal-Key
  accessControlAllowMethods:
    - GET
    - PUT
    - POST
    - DELETE
    - PATCH
    - OPTIONS
x-wso2-production-endpoints:
  urls:
    - 'http://localhost:8290'
  type: http
x-wso2-sandbox-endpoints:
  urls:
    - 'http://localhost:8290'
  type: http
x-wso2-basePath: /wso2internalintegratorapis/1.0.0
x-wso2-transports:
  - http
  - https
x-wso2-application-security:
  security-types:
    - oauth2
  optional: false
x-wso2-response-cache:
  enabled: false
  cacheTimeoutInSeconds: 300
